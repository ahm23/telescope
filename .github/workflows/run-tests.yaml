name: Run Tests

on:
  push:

  pull_request:
    types: [opened, reopened]

  workflow_dispatch:

jobs:
  telescope-tests:
    runs-on: ubuntu-latest
    steps:
      - name: checkout 🛎️
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: deps
        run: pnpm install
      - name: build
        run: pnpm run build
      - name: ast
        run: pnpm --filter @cosmology/ast run test
      - name: parser
        run: pnpm --filter @cosmology/proto-parser run test
      - name: telescope
        run: pnpm --filter @hyperweb/telescope run test
